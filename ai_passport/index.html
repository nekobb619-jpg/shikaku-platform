<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成AIパスポート試験 対策問題集</title>
<style>
  :root{
    --bg:#0f1419;
    --panel:#1a2230;
    --panel2:#212c3d;
    --accent:#5eead4;
    --accent2:#818cf8;
    --text:#e6edf3;
    --sub:#8b98a9;
    --good:#4ade80;
    --bad:#f87171;
    --border:#2d3a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:linear-gradient(160deg,#0f1419,#141b27);
    color:var(--text);
    min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto;padding:20px 16px 60px;}
  header{
    text-align:center;
    padding:18px 0 8px;
  }
  header h1{
    font-size:1.3rem;
    margin:0 0 4px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    font-weight:800;
  }
  header p{color:var(--sub);font-size:0.8rem;margin:0;}

  .screen{display:none;}
  .screen.active{display:block;}

  /* ホーム画面 */
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px;
    margin-bottom:14px;
  }
  .stat-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:6px;
  }
  .stat-box{
    background:var(--panel2);
    border-radius:12px;
    padding:12px 8px;
    text-align:center;
  }
  .stat-box .num{font-size:1.4rem;font-weight:800;color:var(--accent);}
  .stat-box .label{font-size:0.7rem;color:var(--sub);margin-top:2px;}

  .cat-list{display:flex;flex-direction:column;gap:10px;}
  .cat-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--panel2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px 16px;
    cursor:pointer;
    transition:0.15s;
  }
  .cat-item:active{transform:scale(0.98);}
  .cat-item .ci-left{display:flex;align-items:center;gap:10px;}
  .cat-item .ci-icon{font-size:1.4rem;}
  .cat-item .ci-name{font-weight:700;font-size:0.95rem;}
  .cat-item .ci-sub{font-size:0.72rem;color:var(--sub);margin-top:2px;}
  .cat-item .ci-progress{font-size:0.72rem;color:var(--accent);font-weight:700;}

  .mode-row{display:flex;gap:10px;margin-top:14px;}
  .btn{
    flex:1;
    padding:13px;
    border-radius:12px;
    border:none;
    font-weight:700;
    font-size:0.85rem;
    cursor:pointer;
  }
  .btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#0f1419;}
  .btn-secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border);}
  .btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--border);}
  .btn:active{transform:scale(0.97);}

  /* クイズ画面 */
  .quiz-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    font-size:0.78rem;
    color:var(--sub);
  }
  .progress-bar{
    height:6px;
    background:var(--panel2);
    border-radius:4px;
    overflow:hidden;
    margin-bottom:18px;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width 0.3s;
  }
  .q-cat-badge{
    display:inline-block;
    font-size:0.68rem;
    color:var(--accent2);
    background:rgba(129,140,248,0.12);
    border:1px solid rgba(129,140,248,0.3);
    padding:3px 9px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .q-text{
    font-size:1.02rem;
    line-height:1.6;
    margin-bottom:18px;
    font-weight:600;
  }
  .choices{display:flex;flex-direction:column;gap:10px;}
  .choice{
    background:var(--panel2);
    border:1.5px solid var(--border);
    border-radius:12px;
    padding:13px 14px;
    font-size:0.88rem;
    line-height:1.5;
    cursor:pointer;
    display:flex;
    gap:10px;
  }
  .choice:active{transform:scale(0.99);}
  .choice .c-mark{
    flex-shrink:0;
    width:22px;height:22px;
    border-radius:50%;
    border:1.5px solid var(--sub);
    display:flex;align-items:center;justify-content:center;
    font-size:0.7rem;
    font-weight:700;
    color:var(--sub);
  }
  .choice.correct{border-color:var(--good);background:rgba(74,222,128,0.1);}
  .choice.correct .c-mark{border-color:var(--good);background:var(--good);color:#0f1419;}
  .choice.wrong{border-color:var(--bad);background:rgba(248,113,113,0.1);}
  .choice.wrong .c-mark{border-color:var(--bad);background:var(--bad);color:#0f1419;}
  .choice.disabled{cursor:default;}

  .explain-box{
    margin-top:16px;
    background:var(--panel2);
    border-left:3px solid var(--accent);
    border-radius:10px;
    padding:14px 16px;
    font-size:0.84rem;
    line-height:1.65;
    color:var(--text);
    display:none;
  }
  .explain-box.show{display:block;}
  .explain-box .e-label{font-weight:700;color:var(--accent);font-size:0.78rem;margin-bottom:6px;}

  .nav-row{display:flex;gap:10px;margin-top:18px;}

  /* 結果画面 */
  .result-circle{
    width:140px;height:140px;
    margin:10px auto 18px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;
    background:var(--panel2);
    border:6px solid var(--accent);
  }
  .result-circle .rc-pct{font-size:2rem;font-weight:800;color:var(--accent);}
  .result-circle .rc-sub{font-size:0.7rem;color:var(--sub);}
  .review-item{
    background:var(--panel2);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:8px;
    font-size:0.8rem;
  }
  .review-item .ri-q{font-weight:700;margin-bottom:4px;}
  .review-item .ri-ans{color:var(--sub);}
  .review-item.wrong{border-left:3px solid var(--bad);}
  .review-item.right{border-left:3px solid var(--good);}

  .home-link{
    display:inline-block;
    margin:14px 0 4px;
    color:var(--sub);
    font-size:0.78rem;
    cursor:pointer;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎓 生成AIパスポート 対策問題集</h1>
    <p>分野別に出題 / 解説付き / 学習履歴を記録</p>
  </header>

  <!-- ホーム画面 -->
  <div class="screen active" id="screen-home">
    <div class="card">
      <div class="stat-grid">
        <div class="stat-box"><div class="num" id="stat-total">0</div><div class="label">総回答数</div></div>
        <div class="stat-box"><div class="num" id="stat-rate">0%</div><div class="label">正答率</div></div>
        <div class="stat-box"><div class="num" id="stat-streak">0</div><div class="label">学習日数</div></div>
      </div>
    </div>

    <div class="card">
      <div class="cat-list" id="cat-list"></div>
      <div class="mode-row">
        <button class="btn btn-primary" id="btn-start-all">全分野ミックス (25問)</button>
      </div>
      <div class="mode-row">
        <button class="btn btn-secondary" id="btn-wrong-review">苦手問題を復習</button>
        <button class="btn btn-ghost" id="btn-reset">記録をリセット</button>
      </div>
    </div>
  </div>

  <!-- クイズ画面 -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-top">
      <span id="quiz-position">問題 1 / 10</span>
      <span id="quiz-score">正解 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <div class="card">
      <span class="q-cat-badge" id="q-cat-badge">分野</span>
      <div class="q-text" id="q-text">問題文</div>
      <div class="choices" id="choices"></div>
      <div class="explain-box" id="explain-box">
        <div class="e-label">💡 解説</div>
        <div id="explain-text"></div>
      </div>
    </div>

    <div class="nav-row">
      <button class="btn btn-ghost" id="btn-quit">中断してホームへ</button>
      <button class="btn btn-primary" id="btn-next" style="display:none;">次の問題へ</button>
    </div>
  </div>

  <!-- 結果画面 -->
  <div class="screen" id="screen-result">
    <div class="card" style="text-align:center;">
      <div class="result-circle">
        <div class="rc-pct" id="result-pct">0%</div>
        <div class="rc-sub" id="result-frac">0/0問</div>
      </div>
      <div id="result-msg" style="font-size:0.9rem;color:var(--sub);margin-bottom:6px;"></div>
    </div>
    <div class="card">
      <div style="font-weight:700;margin-bottom:10px;font-size:0.9rem;">📝 振り返り</div>
      <div id="review-list"></div>
    </div>
    <div class="mode-row">
      <button class="btn btn-secondary" id="btn-result-home">ホームへ戻る</button>
      <button class="btn btn-primary" id="btn-retry">もう一度挑戦</button>
    </div>
  </div>
</div>

<script>
/* ===================== 問題データ ===================== */
const CATEGORIES = [
  {id:"basics", name:"AIの基礎知識", icon:"🧠", sub:"AI/機械学習/生成AIの仕組み"},
  {id:"prompt", name:"プロンプトエンジニアリング", icon:"✍️", sub:"効果的な指示の出し方"},
  {id:"usage", name:"業務活用・リテラシー", icon:"💼", sub:"ビジネスでの利活用"},
  {id:"risk", name:"法律・倫理・リスク", icon:"⚖️", sub:"著作権・個人情報・ハルシネーション"},
];

const QUESTIONS = [
  // ---------------- AIの基礎知識 ----------------
  {cat:"basics", q:"生成AI(Generative AI)の説明として最も適切なものはどれか。",
    choices:[
      "既存データを分類・予測するだけのAI",
      "学習したデータのパターンをもとに、文章・画像・音声などの新しいコンテンツを生成できるAI",
      "人間の指示を一切必要とせず自律的に動作するロボット全般",
      "インターネット検索結果をそのまま表示するAI"],
    answer:1,
    explain:"生成AIは大量のデータから学習したパターンに基づき、テキストや画像など新しいコンテンツを生成する技術です。検索や単純な分類とは異なり、新規の出力を「創出」する点が特徴です。"},
  {cat:"basics", q:"大規模言語モデル(LLM)が文章を生成する基本的な仕組みとして正しいのはどれか。",
    choices:[
      "あらかじめ用意された回答文をデータベースから検索して返している",
      "直前までの文脈をもとに、次に来る確率が高い単語(トークン)を逐次予測して文章を組み立てている",
      "人間のオペレーターがリアルタイムで回答を作成している",
      "入力文をそのまま翻訳して出力している"],
    answer:1,
    explain:"LLMは「次のトークンを予測する」という確率モデルに基づいて動作します。文脈に応じて最も自然と判断される単語を逐次選び、文章として組み立てていきます。"},
  {cat:"basics", q:"「ハルシネーション(Hallucination)」とは何を指す用語か。",
    choices:[
      "AIが学習データの著作権を侵害すること",
      "AIが事実に基づかない、もっともらしい誤った情報を生成してしまう現象",
      "AIの応答速度が遅くなる現象",
      "AIが個人情報を漏洩させること"],
    answer:1,
    explain:"ハルシネーションは生成AI特有の課題で、事実とは異なる内容を確信ありげに出力してしまう現象です。生成された情報は必ず事実確認(ファクトチェック)することが推奨されます。"},
  {cat:"basics", q:"ディープラーニング(深層学習)の特徴として正しいものはどれか。",
    choices:[
      "人間が特徴量を逐一手動で設計する必要がある",
      "多層構造のニューラルネットワークを用い、データから特徴量を自動的に学習する",
      "必ず教師なし学習でなければならない",
      "画像データにしか応用できない"],
    answer:1,
    explain:"ディープラーニングは多層のニューラルネットワークを使い、人手による特徴量設計なしにデータから自動的にパターンや特徴を学習できる点が大きな特徴です。"},
  {cat:"basics", q:"画像生成AIにおける「拡散モデル(Diffusion Model)」のおおまかな仕組みとして正しいのはどれか。",
    choices:[
      "ランダムノイズから段階的にノイズを除去していくことで画像を生成する",
      "既存の画像を単純にコピー&ペーストして合成する",
      "ユーザーが描いた線画をそのままベクター化する",
      "文章を直接ピクセルデータに変換するルールベースの処理"],
    answer:0,
    explain:"拡散モデルは、ランダムなノイズ画像から少しずつノイズを取り除く(逆拡散)過程を学習し、最終的にプロンプトに沿った画像を生成する手法です。"},
  {cat:"basics", q:"マルチモーダルAIとはどのようなAIを指すか。",
    choices:[
      "1つの言語にのみ対応したAI",
      "テキスト・画像・音声など複数の種類のデータを統合的に扱えるAI",
      "複数のサーバーで分散処理されるAI",
      "有料プランのみで利用できるAI"],
    answer:1,
    explain:"マルチモーダルAIは、テキスト・画像・音声・動画など異なる種類(モダリティ)の情報を組み合わせて理解・生成できるAIを指します。"},
  {cat:"basics", q:"ファインチューニングの説明として最も適切なものはどれか。",
    choices:[
      "学習済みモデルに対し、特定の目的やドメインのデータで追加学習を行い性能を調整すること",
      "プロンプトの文字数を短く調整すること",
      "AIサービスの利用料金プランを変更すること",
      "出力結果をユーザーが手作業で修正すること"],
    answer:0,
    explain:"ファインチューニングは、既に学習済みの汎用モデルに対し特定タスクやドメインのデータを追加で学習させ、その分野での精度や適合性を高める手法です。"},
  {cat:"basics", q:"「トークン」とは生成AIの文脈でどのようなものを指すか。",
    choices:[
      "AIサービスにログインするための認証コード",
      "文章をAIが処理する際の最小単位となる、単語やその一部の断片",
      "AIモデルの利用回数を数えるポイントのこと",
      "画像生成AIが出力する画素の単位"],
    answer:1,
    explain:"トークンは、LLMが文章を処理・生成する際に扱う最小単位で、単語全体や単語の一部、記号などに分割されます。料金や処理量もトークン数に基づいて計算されることが多くあります。"},
  {cat:"basics", q:"生成AIの学習における「事前学習(プレトレーニング)」の説明として適切なものはどれか。",
    choices:[
      "ユーザーが入力したプロンプトのみを使ってその場で行う学習",
      "インターネット上の大量のテキストなど膨大なデータを用いて、汎用的な言語パターンをあらかじめ学習させる工程",
      "AIモデルを利用する前にユーザーが行う事前設定作業のこと",
      "学習済みモデルの重みをすべて削除する作業"],
    answer:1,
    explain:"事前学習は、大量かつ多様なデータを用いてモデルに言語の構造や知識の汎用的なパターンを学習させる工程で、その後の用途特化のファインチューニングの土台となります。"},
  {cat:"basics", q:"AIにおける「パラメータ」の説明として最も適切なものはどれか。",
    choices:[
      "ユーザーが画面上で設定する表示言語の項目",
      "モデルが学習を通じて獲得する、入力から出力を導く際の重み(数値)のこと",
      "AIサービスの月額利用料金のこと",
      "AIが扱える画像の最大サイズのこと"],
    answer:1,
    explain:"パラメータは、ニューラルネットワーク内でデータの重み付けを担う数値で、学習を通じて調整されます。一般にパラメータ数が多いほどモデルの表現力は高まりやすい傾向があります。"},
  {cat:"basics", q:"RAG(Retrieval-Augmented Generation:検索拡張生成)の仕組みとして正しいのはどれか。",
    choices:[
      "外部の文書やデータベースから関連情報を検索し、それをもとに生成AIが回答を作成する手法",
      "AIモデルのパラメータを再学習なしに直接書き換える手法",
      "複数の生成AIモデルを並列に動かして多数決を取る手法",
      "ユーザーの個人情報を自動収集して回答に利用する手法"],
    answer:0,
    explain:"RAGは、外部の文書・データベースなどから関連性の高い情報を検索し、それをプロンプトに組み込んで生成AIに回答させる手法で、最新情報や社内情報への対応、ハルシネーション低減に有効です。"},
  {cat:"basics", q:"生成AIの「学習データのカットオフ(知識の範囲)」について正しい説明はどれか。",
    choices:[
      "モデルは学習データに含まれていない最新の出来事についても常に正確に把握している",
      "モデルの知識は学習時点までのデータに基づくため、それ以降の出来事は基本的に把握できない",
      "カットオフは画像生成AIにのみ存在し、文章生成AIには存在しない",
      "カットオフという概念は生成AIには存在しない"],
    answer:1,
    explain:"多くの生成AIは特定時点までのデータで学習されており、それ以降に起きた出来事については基本的に把握していません。最新情報が必要な場合はWeb検索などの補助機能が必要です。"},
  {cat:"basics", q:"「自然言語処理(NLP)」とはどのような技術領域を指すか。",
    choices:[
      "コンピュータが人間の話し言葉や書き言葉を解析・生成する技術領域",
      "プログラミング言語をコンパイルする技術領域",
      "画像データのみを扱う技術領域",
      "ネットワーク通信プロトコルを設計する技術領域"],
    answer:0,
    explain:"自然言語処理(NLP)は、人間が日常的に使う言語(自然言語)をコンピュータが解析・理解・生成するための技術分野で、生成AIの中核技術の一つです。"},
  {cat:"basics", q:"AIの「教師あり学習」の説明として正しいものはどれか。",
    choices:[
      "正解ラベル(入力に対する正しい出力)が付与されたデータを使ってモデルを学習させる手法",
      "人間の教師が常にリアルタイムでAIの出力を監督する手法",
      "ラベルのない大量のデータからパターンのみを抽出する手法",
      "AIが自分自身を相手に試行錯誤しながら学習する手法"],
    answer:0,
    explain:"教師あり学習は、入力とそれに対応する正解(ラベル)のペアからなるデータを用いて、入力から正しい出力を予測できるようにモデルを学習させる手法です。"},
  {cat:"basics", q:"「強化学習」の基本的な仕組みとして正しいものはどれか。",
    choices:[
      "エージェントが環境とのやり取りの中で得られる報酬を最大化するように行動を学習する手法",
      "あらかじめ用意された正解データのみをひたすら暗記する手法",
      "ラベルなしデータの類似度のみで分類を行う手法",
      "人間が逐一すべての行動を指示する手法"],
    answer:0,
    explain:"強化学習は、エージェントが試行錯誤を通じて環境から得られる報酬(フィードバック)を最大化するように、最適な行動方針を学習していく手法です。"},
  {cat:"basics", q:"生成AIの応答生成における「温度(temperature)」パラメータの役割として適切なものはどれか。",
    choices:[

/* ===================== 状態管理 ===================== */
const STORAGE_KEY = "ai_passport_quiz_state_v1";

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {
    totalAnswered:0,
    totalCorrect:0,
    catStats:{}, // {catId: {answered, correct}}
    wrongQIds:[], // 間違えた問題のインデックス(重複可、最新を優先)
    studyDates:[] // YYYY-MM-DD の配列
  };
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = loadState();

// 問題にユニークIDを付与(配列インデックス)
QUESTIONS.forEach((q,i)=>q.id=i);

let session = null; // 現在のクイズセッション

/* ===================== 画面遷移 ===================== */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ===================== ホーム画面描画 ===================== */
function renderHome(){
  document.getElementById("stat-total").textContent = state.totalAnswered;
  const rate = state.totalAnswered ? Math.round(state.totalCorrect/state.totalAnswered*100) : 0;
  document.getElementById("stat-rate").textContent = rate + "%";
  document.getElementById("stat-streak").textContent = state.studyDates.length;

  const list = document.getElementById("cat-list");
  list.innerHTML = "";
  CATEGORIES.forEach(c=>{
    const cs = state.catStats[c.id] || {answered:0, correct:0};
    const total = QUESTIONS.filter(q=>q.cat===c.id).length;
    const div = document.createElement("div");
    div.className = "cat-item";
    div.innerHTML = `
      <div class="ci-left">
        <div class="ci-icon">${c.icon}</div>
        <div>
          <div class="ci-name">${c.name}</div>
          <div class="ci-sub">${c.sub} (全${total}問)</div>
        </div>
      </div>
      <div class="ci-progress">${cs.answered ? Math.round(cs.correct/cs.answered*100)+"%" : "未挑戦"}</div>
    `;
    div.addEventListener("click", ()=>startQuiz(c.id));
    list.appendChild(div);
  });

  const wrongBtn = document.getElementById("btn-wrong-review");
  wrongBtn.disabled = state.wrongQIds.length === 0;
  wrongBtn.style.opacity = state.wrongQIds.length === 0 ? "0.5" : "1";
}

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startQuiz(catId){
  let pool;
  if(catId === "all"){
    pool = shuffle(QUESTIONS).slice(0,25);
  } else if(catId === "wrong"){
    const uniqueIds = [...new Set(state.wrongQIds)];
    pool = shuffle(uniqueIds.map(id=>QUESTIONS[id]));
  } else {
    pool = shuffle(QUESTIONS.filter(q=>q.cat===catId));
  }
  session = {
    questions: pool,
    index: 0,
    correct: 0,
    answered: false,
    results: [] // {qId, chosen, isCorrect}
  };
  showScreen("screen-quiz");
  renderQuestion();
}

function catName(id){
  const c = CATEGORIES.find(c=>c.id===id);
  return c ? c.icon + " " + c.name : id;
}

function renderQuestion(){
  const q = session.questions[session.index];
  document.getElementById("quiz-position").textContent =
    `問題 ${session.index+1} / ${session.questions.length}`;
  document.getElementById("quiz-score").textContent = `正解 ${session.correct}`;
  document.getElementById("progress-fill").style.width =
    (session.index/session.questions.length*100) + "%";
  document.getElementById("q-cat-badge").textContent = catName(q.cat);
  document.getElementById("q-text").textContent = q.q;

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";
  const marks = ["A","B","C","D"];
  q.choices.forEach((choiceText, idx)=>{
    const div = document.createElement("div");
    div.className = "choice";
    div.innerHTML = `<div class="c-mark">${marks[idx]}</div><div>${choiceText}</div>`;
    div.addEventListener("click", ()=>selectAnswer(idx));
    choicesDiv.appendChild(div);
  });

  document.getElementById("explain-box").classList.remove("show");
  document.getElementById("btn-next").style.display = "none";
  session.answered = false;
}

function selectAnswer(idx){
  if(session.answered) return;
  session.answered = true;
  const q = session.questions[session.index];
  const isCorrect = idx === q.answer;
  if(isCorrect) session.correct++;

  // 統計更新
  state.totalAnswered++;
  if(isCorrect) state.totalCorrect++;
  if(!state.catStats[q.cat]) state.catStats[q.cat] = {answered:0, correct:0};
  state.catStats[q.cat].answered++;
  if(isCorrect) state.catStats[q.cat].correct++;

  if(!isCorrect){
    state.wrongQIds.push(q.id);
    if(state.wrongQIds.length > 100) state.wrongQIds.shift();
  } else {
    // 正解したら苦手リストから除去
    state.wrongQIds = state.wrongQIds.filter(id=>id!==q.id);
  }

  const today = new Date().toISOString().slice(0,10);
  if(!state.studyDates.includes(today)) state.studyDates.push(today);
  saveState();

  session.results.push({qId:q.id, chosen:idx, isCorrect});

  // UI反映
  const choiceEls = document.querySelectorAll("#choices .choice");
  choiceEls.forEach((el,i)=>{
    el.classList.add("disabled");
    if(i === q.answer) el.classList.add("correct");
    else if(i === idx) el.classList.add("wrong");
  });

  document.getElementById("explain-text").textContent = q.explain;
  document.getElementById("explain-box").classList.add("show");
  document.getElementById("quiz-score").textContent = `正解 ${session.correct}`;
  document.getElementById("btn-next").style.display = "block";

  if(session.index === session.questions.length - 1){
    document.getElementById("btn-next").textContent = "結果を見る";
  }
}

function nextQuestion(){
  if(session.index === session.questions.length - 1){
    showResult();
  } else {
    session.index++;
    renderQuestion();
  }
}

function showResult(){
  showScreen("screen-result");
  const total = session.questions.length;
  const correct = session.correct;
  const pct = Math.round(correct/total*100);
  document.getElementById("result-pct").textContent = pct + "%";
  document.getElementById("result-frac").textContent = `${correct}/${total}問`;

  let msg;
  if(pct >= 90) msg = "素晴らしい!合格ラインを大きく上回っています 🎉";
  else if(pct >= 70) msg = "良い調子です!間違えた問題を復習しましょう 👍";
  else if(pct >= 50) msg = "基礎は身についています。苦手分野を重点的に復習しましょう 📚";
  else msg = "まずは各分野の基礎からじっくり学習しましょう 💪";
  document.getElementById("result-msg").textContent = msg;

  const reviewList = document.getElementById("review-list");
  reviewList.innerHTML = "";
  session.results.forEach(r=>{
    const q = QUESTIONS[r.qId];
    const div = document.createElement("div");
    div.className = "review-item " + (r.isCorrect ? "right" : "wrong");
    div.innerHTML = `
      <div class="ri-q">${r.isCorrect ? "✅" : "❌"} ${q.q}</div>
      <div class="ri-ans">正解: ${q.choices[q.answer]}</div>
    `;
    reviewList.appendChild(div);
  });
}

/* ===================== イベント登録 ===================== */
document.getElementById("btn-start-all").addEventListener("click", ()=>startQuiz("all"));
document.getElementById("btn-wrong-review").addEventListener("click", ()=>{
  if(state.wrongQIds.length === 0) return;
  startQuiz("wrong");
});
document.getElementById("btn-reset").addEventListener("click", ()=>{
  if(confirm("学習記録をすべてリセットします。よろしいですか?")){
    state = {totalAnswered:0, totalCorrect:0, catStats:{}, wrongQIds:[], studyDates:[]};
    saveState();
    renderHome();
  }
});
document.getElementById("btn-quit").addEventListener("click", ()=>{
  showScreen("screen-home");
  renderHome();
});
document.getElementById("btn-next").addEventListener("click", nextQuestion);
document.getElementById("btn-result-home").addEventListener("click", ()=>{
  showScreen("screen-home");
  renderHome();
});
document.getElementById("btn-retry").addEventListener("click", ()=>{
  const cats = [...new Set(session.questions.map(q=>q.cat))];
  if(cats.length > 1){
    startQuiz("all");
  } else {
    startQuiz(cats[0]);
  }
});

/* ===================== 初期化 ===================== */
renderHome();
</script>
</body>
</html>
